<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 영어 회화 학습 & 자동 통역기</title>
    <style>
        :root { --primary: #4F46E5; --primary-hover: #4338CA; --danger: #EF4444; --danger-hover: #DC2626; --success: #10B981; --success-hover: #059669; --bg-color: #F3F4F6; --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { background-color: var(--card-bg); width: 100%; max-width: 700px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 24px; text-align: center; color: var(--primary); margin-bottom: 25px; }
        .section { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 14px; font-weight: 700; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .form-group.row { flex-direction: row; align-items: center; justify-content: space-between; }
        label { font-size: 14px; font-weight: 600; }
        input[type="text"], input[type="password"], textarea, select { padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; font-family: inherit; width: 100%; box-sizing: border-box; }
        select { background-color: white; cursor: pointer; }
        input[type="text"]:focus, input[type="password"]:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        input[type="number"] { padding: 10px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 15px; outline: none; }
        input[type="range"] { accent-color: var(--primary); width: 100%; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; color: white; }
        button.start { background-color: var(--primary); }
        button.start:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button.stop { background-color: var(--danger); flex: 0.4; }
        button.stop:hover { background-color: var(--danger-hover); }
        button.trans-start { background-color: var(--success); }
        button.trans-start:hover { background-color: var(--success-hover); }
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; transform: none; }
        
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #E5E7EB; color: #4B5563; padding: 10px 16px; font-size: 14px; border-radius: 8px; flex: unset; width: auto; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; border: 1px solid #E5E7EB; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #E5E7EB; }
        th { background-color: #EEF2FF; color: #4F46E5; font-weight: 700; font-size: 14px; width: 45%; }
        th.num-col, td.num-col { width: 10%; text-align: center; color: var(--text-muted); font-weight: bold; }
        tr.active-row { background-color: #F5F3FF; border-left: 4px solid #4F46E5; }
        .result-box { display: none; }

        .chat-box { background: white; border: 1px solid #D1D5DB; border-radius: 12px; height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .chat-msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; font-size: 15px; word-break: keep-all; }
        .msg-user { background: #EEF2FF; color: #1F2937; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-ai { background: #10B981; color: white; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-interim { color: #9CA3AF; font-style: italic; align-self: flex-end; }
        .status-bar { margin-top: 15px; padding: 12px; border-radius: 8px; background-color: #EEF2FF; color: var(--primary); text-align: center; font-weight: 600; display: none; }
        .mic-pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; margin-right: 8px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ AI 회화 학습 & 자동 통역기</h2>

    <div class="section" id="voice-settings">
        <div class="section-title">⚙️ 시스템 기본 설정</div>
        <div class="form-group row">
            <label style="width: 30%; color: #EF4444;">Gemini API 키</label>
            <div style="width: 70%;">
                <input type="password" id="api-key" placeholder="여기에 AQ... 키를 한 번만 입력하세요" oninput="saveApiKey()">
            </div>
        </div>
        <div class="form-group row" style="margin-top: 15px;">
            <label style="width: 30%;">영어 발음</label>
            <div style="width: 70%;"><select id="voice-en"><option>음성 불러오는 중...</option></select></div>
        </div>
        <div class="form-group row">
            <label style="width: 30%;">한국어 발음</label>
            <div style="width: 70%;"><select id="voice-ko"><option>음성 불러오는 중...</option></select></div>
        </div>
        <div class="form-group row" style="margin-top: 15px;">
            <label style="width: 30%;">재생 속도 (<span id="speed-val">1.0</span>x)</label>
            <div style="width: 70%;">
                <input type="range" id="speed-control" min="0.5" max="1.5" step="0.1" value="1.0" oninput="document.getElementById('speed-val').innerText = this.value">
            </div>
        </div>
    </div>
    
    <div class="section">
        <div class="tab-buttons">
            <button class="tab-btn active" id="tab-ai" onclick="switchTab('ai')">📝 AI 문장 생성</button>
            <button class="tab-btn" id="tab-custom" onclick="switchTab('custom')">📋 내 문장 학습</button>
            <button class="tab-btn" id="tab-translate" onclick="switchTab('translate')">🎙️ 자동 통역기</button>
        </div>

        <div id="panel-ai">
            <div class="form-group">
                <input type="text" id="topic-input" placeholder="어떤 상황의 문장을 학습할까요? (예: 명함 인쇄 주문)">
            </div>
            <div class="form-group row" style="margin-top: 15px;">
                <label>생성할 표현 개수</label>
                <input type="number" id="sentence-count" min="1" max="20" value="5" style="width: 80px;"> 개
            </div>
            <div class="form-group row">
                <label>문장별 반복 재생 횟수</label>
                <input type="number" id="repeat-count-ai" min="1" max="10" value="3" style="width: 80px;"> 회
            </div>
            <div class="controls">
                <button class="start" onclick="startStudyProcess('ai')">학습 시작</button>
                <button class="stop btn-stop-study" onclick="stopStudyProcess()" disabled>정지</button>
            </div>
        </div>

        <div id="panel-custom" style="display: none;">
            <div class="form-group">
                <textarea id="custom-input" rows="4" placeholder="공부할 영어 문장을 한 줄씩 입력하거나 붙여넣으세요."></textarea>
            </div>
            <div class="form-group row" style="margin-top: 15px;">
                <label>문장별 반복 재생 횟수</label>
                <input type="number" id="repeat-count-custom" min="1" max="10" value="3" style="width: 80px;"> 회
            </div>
            <div class="controls">
                <button class="start" onclick="startStudyProcess('custom')">번역 및 학습 시작</button>
                <button class="stop btn-stop-study" onclick="stopStudyProcess()" disabled>정지</button>
            </div>
        </div>

        <!-- 실시간 통역기 모드 -->
        <div id="panel-translate" style="display: none;">
            <div style="background: #ECFDF5; padding: 12px; border-radius: 8px; border: 1px solid #A7F3D0; text-align: center; color: #065F46; font-weight: bold; margin-bottom: 15px;">
                🤖 대화가 완전히 끝날 때까지 2초간 넉넉히 기다립니다.<br><span style="font-size: 13px; font-weight: normal;">(말이 끊기지 않도록 단어를 차곡차곡 누적해서 번역합니다)</span>
            </div>
            
            <div class="chat-box" id="chat-box"></div>

            <div class="controls">
                <button id="btn-trans-start" class="trans-start" onclick="startInterpreter()">🎙️ 통역 시작</button>
                <button id="btn-trans-stop" class="stop" onclick="stopInterpreter()" disabled>정지</button>
            </div>
        </div>
    </div>

    <div id="status-bar" class="status-bar">대기 중...</div>
    
    <div id="result-box" class="result-box">
        <table id="result-table">
            <thead>
                <tr><th class="num-col">번호</th><th>영어 문장</th><th>한국어 해석</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('api-key').value = savedKey;
    });

    function saveApiKey() {
        const currentKey = document.getElementById('api-key').value.trim();
        localStorage.setItem('geminiApiKey', currentKey);
    }

    function getApiKey() {
        const key = document.getElementById('api-key').value.trim();
        if(!key) { alert("API 키를 먼저 입력해주세요!"); return null; }
        return key;
    }

    const synth = window.speechSynthesis;
    let allVoices = [];
    let currentMode = 'ai'; 

    function populateVoiceList() { 
        allVoices = synth.getVoices(); 
        if(allVoices.length === 0) return;
        const selectEn = document.getElementById('voice-en');
        const selectKo = document.getElementById('voice-ko');
        selectEn.innerHTML = ''; selectKo.innerHTML = '';

        let enVoices = allVoices.filter(v => v.lang.toLowerCase().startsWith('en'));
        let koVoices = allVoices.filter(v => v.lang.toLowerCase().startsWith('ko'));

        enVoices.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = (v.name.includes('Natural') || v.name.includes('Samsung') || v.name.includes('Google')) ? `⭐ ${v.name}` : v.name;
            selectEn.appendChild(opt);
        });
        koVoices.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = (v.name.includes('Natural') || v.name.includes('Samsung') || v.name.includes('Google')) ? `⭐ ${v.name}` : v.name;
            selectKo.appendChild(opt);
        });

        autoSelectBestVoice(selectEn, enVoices);
        autoSelectBestVoice(selectKo, koVoices);
    }
    
    function autoSelectBestVoice(selectEl, voices) {
        let bestIdx = voices.findIndex(v => v.name.includes('Natural') || v.name.includes('Samsung') || v.name.includes('Google'));
        if(bestIdx !== -1) selectEl.selectedIndex = bestIdx;
    }
    
    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('tab-ai').classList.toggle('active', mode === 'ai');
        document.getElementById('tab-custom').classList.toggle('active', mode === 'custom');
        document.getElementById('tab-translate').classList.toggle('active', mode === 'translate');
        
        document.getElementById('panel-ai').style.display = mode === 'ai' ? 'block' : 'none';
        document.getElementById('panel-custom').style.display = mode === 'custom' ? 'block' : 'none';
        document.getElementById('panel-translate').style.display = mode === 'translate' ? 'block' : 'none';

        stopStudyProcess();
        stopInterpreter();
        document.getElementById('result-box').style.display = 'none'; 
    }

    const statusBar = document.getElementById('status-bar');
    function updateStatus(text, show = true) {
        statusBar.innerHTML = text;
        statusBar.style.display = show ? 'block' : 'none';
    }

    function speakText(text, lang, speed) {
        return new Promise((resolve) => {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = lang === 'en' ? 'en-US' : 'ko-KR'; 
            
            const voiceName = lang === 'en' ? document.getElementById('voice-en').value : document.getElementById('voice-ko').value;
            const voice = allVoices.find(v => v.name === voiceName);
            if (voice) utterThis.voice = voice;
            utterThis.rate = speed;
            utterThis.onend = () => resolve();
            utterThis.onerror = () => resolve();
            synth.speak(utterThis);
        });
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    function cleanJsonResponse(text) {
        let cleaned = text.replace(/```json/g, '').replace(/```/g, '').trim();
        return JSON.parse(cleaned);
    }

    // ================= 학습 로직 =================
    let isStudyStopped = false;
    
    async function generateMultipleText(apiKey, topic, count) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const prompt = `주제: "${topic}"\n이 상황에 쓰이는 자연스러운 실생활 영어 표현 ${count}개 생성. 양식: [{"en": "영어", "ko": "한국어"}]`;
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }) });
        const data = await res.json();
        return cleanJsonResponse(data.candidates[0].content.parts[0].text);
    }

    async function translateCustomText(apiKey, lines) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const prompt = `다음 영어 문장들을 자연스럽게 한국어로 번역해.\n${lines.join('\n')}\n양식: [{"en": "영어", "ko": "한국어"}]`;
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }) });
        const data = await res.json();
        return cleanJsonResponse(data.candidates[0].content.parts[0].text);
    }

    async function startStudyProcess(type) {
        const apiKey = getApiKey();
        if(!apiKey) return;
        isStudyStopped = false;
        synth.cancel();
        document.querySelectorAll('.btn-stop-study').forEach(b => b.disabled = false);
        let speed = parseFloat(document.getElementById('speed-control').value);
        let list = [];
        let repeat = parseInt(document.getElementById(type === 'ai' ? 'repeat-count-ai' : 'repeat-count-custom').value) || 3;

        try {
            if(type === 'ai') {
                let topic = document.getElementById('topic-input').value.trim();
                let count = document.getElementById('sentence-count').value;
                if(!topic) return alert("상황을 입력하세요.");
                updateStatus("AI가 문장을 작성 중입니다...");
                list = await generateMultipleText(apiKey, topic, count);
            } else {
                let text = document.getElementById('custom-input').value.trim();
                if(!text) return alert("문장을 입력하세요.");
                updateStatus("번역 중입니다...");
                list = await translateCustomText(apiKey, text.split('\n').filter(l=>l.trim()));
            }
            if(isStudyStopped) return;
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            list.forEach((item, i) => {
                tbody.innerHTML += `<tr id="row-${i}"><td class="num-col">${i+1}</td><td style="font-weight:700;">${item.en}</td><td style="color:#4B5563;">${item.ko}</td></tr>`;
            });
            document.getElementById('result-box').style.display = 'block';

            for(let i=0; i<list.length; i++) {
                if(isStudyStopped) break;
                document.querySelectorAll('#table-body tr').forEach(tr => tr.classList.remove('active-row'));
                document.getElementById(`row-${i}`).classList.add('active-row');
                
                for(let r=1; r<=repeat; r++) {
                    if(isStudyStopped) break;
                    updateStatus(`⚡ [${i+1}번] 반복 ${r}/${repeat} 회`);
                    await speakText(list[i].en, 'en', speed);
                    if(isStudyStopped) break; await sleep(600);
                    await speakText(list[i].ko, 'ko', speed);
                    if(isStudyStopped) break; await sleep(1200);
                }
            }
            if(!isStudyStopped) updateStatus("✨ 학습 완료!");
        } catch(e) { updateStatus("오류 발생. API 키가 정확한지 확인해주세요."); }
    }
    
    function stopStudyProcess() {
        isStudyStopped = true;
        synth.cancel();
        document.querySelectorAll('.btn-stop-study').forEach(b => b.disabled = true);
        updateStatus("정지됨");
    }

    // ================= 🎙️ 누적형 자동 언어인식 통역기 로직 =================
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isInterpreting = false;
    let isSpeakingAudio = false;
    let speechTimeout = null; 
    let finalTranscriptAccumulated = ''; // 💡 말을 담아두는 누적 바구니 생성

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'ko-KR'; 
    }

    async function autoDetectAndTranslate(apiKey, text) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const prompt = `주어진 텍스트를 분석해서, 내용이 주로 한국어면 자연스러운 영어로 번역하고, 내용이 주로 영어면 자연스러운 한국어로 번역해.
        다른 설명 없이 아래 JSON 양식으로만 결과를 출력해.
        양식: {"target_lang": "en" 또는 "ko", "translated_text": "최종문장"}
        텍스트: "${text}"`;
        
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }) });
        const data = await res.json();
        return cleanJsonResponse(data.candidates[0].content.parts[0].text);
    }

    function addChatMessage(text, type) {
        const chatBox = document.getElementById('chat-box');
        if(type === 'interim') {
            let interimDiv = document.getElementById('interim-msg');
            if(!interimDiv) {
                interimDiv = document.createElement('div');
                interimDiv.id = 'interim-msg';
                interimDiv.className = 'chat-msg msg-interim';
                chatBox.appendChild(interimDiv);
            }
            interimDiv.textContent = text + "...";
        } else {
            let interimDiv = document.getElementById('interim-msg');
            if(interimDiv) interimDiv.remove();
            const div = document.createElement('div');
            div.className = `chat-msg ${type === 'user' ? 'msg-user' : 'msg-ai'}`;
            div.textContent = text;
            chatBox.appendChild(div);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function startInterpreter() {
        const apiKey = getApiKey();
        if(!apiKey) return;
        if (!recognition) return alert("음성 인식을 지원하지 않는 브라우저입니다. 크롬(Chrome)을 사용해주세요.");
        
        isInterpreting = true;
        isSpeakingAudio = false;
        finalTranscriptAccumulated = ''; // 시작할 때 바구니 비우기
        synth.cancel();
        
        document.getElementById('chat-box').innerHTML = '<div style="text-align:center; color:#9CA3AF; margin-top:50px;">마이크 권한을 허용하고 편하게 말씀하세요.<br>버튼을 누르고 1초 뒤에 말씀하시면 더 정확합니다!</div>';
        document.getElementById('btn-trans-start').disabled = true;
        document.getElementById('btn-trans-stop').disabled = false;
        updateStatus('<span class="mic-pulse"></span>마이크가 듣고 있습니다...');

        recognition.onresult = (event) => {
            if(!isInterpreting || isSpeakingAudio) return;
            
            let interimTranscript = '';
            
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    // 💡 [핵심] 단어가 확정될 때마다 바구니에 더해줍니다.
                    finalTranscriptAccumulated += event.results[i][0].transcript + ' ';
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            // 누적된 문장과 아직 말하고 있는 임시 문장을 합쳐서 화면에 보여줌
            let textToDisplay = finalTranscriptAccumulated + interimTranscript;
            if (textToDisplay.trim()) {
                addChatMessage(textToDisplay, 'interim');
            }

            // 💡 [핵심] 2.0초 동안 새로운 말이 없으면 최종 완성으로 판단합니다.
            clearTimeout(speechTimeout);
            speechTimeout = setTimeout(async () => {
                let completeSentence = textToDisplay.trim();
                
                if (completeSentence) {
                    isSpeakingAudio = true;
                    recognition.stop();
                    
                    addChatMessage(completeSentence, 'user');
                    updateStatus('🔄 AI가 통역 중입니다...');
                    
                    // 💡 [핵심] 번역이 시작되면 다음 문장을 위해 바구니를 다시 비웁니다.
                    finalTranscriptAccumulated = ''; 

                    try {
                        const result = await autoDetectAndTranslate(apiKey, completeSentence);
                        addChatMessage(result.translated_text, 'ai');
                        let speed = parseFloat(document.getElementById('speed-control').value);
                        updateStatus('🔊 통역 내용 낭독 중...');
                        await speakText(result.translated_text, result.target_lang, speed);
                    } catch(e) {
                        addChatMessage("통역 에러가 발생했습니다. 다시 말씀해주세요.", 'interim');
                    }

                    if(isInterpreting) {
                        isSpeakingAudio = false;
                        updateStatus('<span class="mic-pulse"></span>마이크가 다시 듣고 있습니다...');
                        try { recognition.start(); } catch(e){}
                    }
                }
            }, 2000); // 침묵 대기 시간을 2.0초로 넉넉하게 연장!
        };
        
        recognition.onend = () => {
            if (isInterpreting && !isSpeakingAudio) {
                try { recognition.start(); } catch(e){}
            }
        };
        try { recognition.start(); } catch(e){}
    }

    function stopInterpreter() {
        isInterpreting = false;
        synth.cancel();
        clearTimeout(speechTimeout);
        if(recognition) recognition.stop();
        document.getElementById('btn-trans-start').disabled = false;
        document.getElementById('btn-trans-stop').disabled = true;
        updateStatus("통역기가 정지되었습니다.");
    }
</script>

</body>
</html>
