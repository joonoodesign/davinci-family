<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 영어 회화 학습 & 자동 연속 통역기</title>
    <style>
        :root { --primary: #4F46E5; --primary-hover: #4338CA; --danger: #EF4444; --danger-hover: #DC2626; --success: #10B981; --success-hover: #059669; --bg-color: #F3F4F6; --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { background-color: var(--card-bg); width: 100%; max-width: 700px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 24px; text-align: center; color: var(--primary); margin-bottom: 25px; }
        .section { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 14px; font-weight: 700; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .form-group.row { flex-direction: row; align-items: center; justify-content: space-between; }
        label { font-size: 14px; font-weight: 600; }
        input[type="text"], input[type="password"], textarea, select { padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s; font-family: inherit; width: 100%; box-sizing: border-box; }
        select { background-color: white; cursor: pointer; }
        input[type="text"]:focus, input[type="password"]:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        input[type="number"] { padding: 10px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 15px; outline: none; }
        input[type="range"] { accent-color: var(--primary); width: 100%; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 16px; font-size: 16px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; color: white; }
        button.start { background-color: var(--primary); }
        button.start:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button.stop { background-color: var(--danger); flex: 0.4; }
        button.stop:hover { background-color: var(--danger-hover); }
        
        button.trans-start { background-color: var(--primary); box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2); }
        button.trans-start:hover { background-color: var(--primary-hover); }
        button.trans-stop { background-color: var(--danger); animation: pulseBg 2s infinite; }
        
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; transform: none; animation: none; box-shadow: none; }
        
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #E5E7EB; color: #4B5563; padding: 12px 16px; font-size: 14px; border-radius: 8px; flex: unset; width: auto; white-space: nowrap; border: none; font-weight: 700; cursor: pointer;}
        .tab-btn.active { background: var(--primary); color: white; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; border: 1px solid #E5E7EB; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #E5E7EB; }
        th { background-color: #EEF2FF; color: #4F46E5; font-weight: 700; font-size: 14px; width: 45%; }
        th.num-col, td.num-col { width: 10%; text-align: center; color: var(--text-muted); font-weight: bold; }
        tr.active-row { background-color: #F5F3FF; border-left: 4px solid #4F46E5; }
        .result-box { display: none; }

        .chat-box { background: white; border: 1px solid #D1D5DB; border-radius: 12px; height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .chat-msg { padding: 12px 16px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 15px; word-break: keep-all; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg-user { background: #EEF2FF; color: #1F2937; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-ai { background: #10B981; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-error { background: #FEE2E2; color: #991B1B; align-self: center; font-size: 13px; text-align: center; border-radius: 8px; }
        .status-bar { margin-top: 15px; padding: 12px; border-radius: 8px; background-color: #EEF2FF; color: var(--primary); text-align: center; font-weight: 700; display: none; font-size: 15px; }
        
        @keyframes pulseBg { 0% { background-color: var(--danger); } 50% { background-color: #B91C1C; transform: scale(0.98); } 100% { background-color: var(--danger); } }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ AI 회화 학습 & 자동 연속 통역기</h2>

    <div class="section" id="voice-settings">
        <div class="section-title">⚙️ 시스템 기본 설정</div>
        <div class="form-group row">
            <label style="width: 30%; color: #EF4444;">Gemini API 키</label>
            <div style="width: 70%;">
                <input type="password" id="api-key" placeholder="여기에 AQ... 키를 한 번만 입력하세요" oninput="saveApiKey()">
            </div>
        </div>
        <div class="form-group row" style="margin-top: 15px;">
            <label style="width: 30%;">영어 발음</label>
            <div style="width: 70%;"><select id="voice-en"><option>음성 불러오는 중...</option></select></div>
        </div>
        <div class="form-group row">
            <label style="width: 30%;">한국어 발음</label>
            <div style="width: 70%;"><select id="voice-ko"><option>음성 불러오는 중...</option></select></div>
        </div>
        <div class="form-group row" style="margin-top: 15px;">
            <label style="width: 30%;">재생 속도 (<span id="speed-val">1.0</span>x)</label>
            <div style="width: 70%;">
                <input type="range" id="speed-control" min="0.5" max="1.5" step="0.1" value="1.0" oninput="document.getElementById('speed-val').innerText = this.value">
            </div>
        </div>
    </div>
    
    <div class="section">
        <div class="tab-buttons">
            <button class="tab-btn active" id="tab-ai" onclick="switchTab('ai')">📝 AI 문장 생성</button>
            <button class="tab-btn" id="tab-custom" onclick="switchTab('custom')">📋 내 문장 학습</button>
            <button class="tab-btn" id="tab-translate" onclick="switchTab('translate')">🤝 자동 연속 통역기</button>
        </div>

        <div id="panel-ai">
            <div class="form-group">
                <input type="text" id="topic-input" placeholder="어떤 상황의 문장을 학습할까요? (예: 명함 인쇄 주문)">
            </div>
            <div class="form-group row" style="margin-top: 15px;">
                <label>생성할 표현 개수</label>
                <input type="number" id="sentence-count" min="1" max="20" value="5" style="width: 80px;"> 개
            </div>
            <div class="form-group row">
                <label>문장별 반복 재생 횟수</label>
                <input type="number" id="repeat-count-ai" min="1" max="10" value="3" style="width: 80px;"> 회
            </div>
            <div class="controls">
                <button class="start" onclick="startStudyProcess('ai')">학습 시작</button>
                <button class="stop btn-stop-study" onclick="stopStudyProcess()" disabled>정지</button>
            </div>
        </div>

        <div id="panel-custom" style="display: none;">
            <div class="form-group">
                <textarea id="custom-input" rows="4" placeholder="공부할 영어 문장을 한 줄씩 입력하거나 붙여넣으세요."></textarea>
            </div>
            <div class="form-group row" style="margin-top: 15px;">
                <label>문장별 반복 재생 횟수</label>
                <input type="number" id="repeat-count-custom" min="1" max="10" value="3" style="width: 80px;"> 회
            </div>
            <div class="controls">
                <button class="start" onclick="startStudyProcess('custom')">번역 및 학습 시작</button>
                <button class="stop btn-stop-study" onclick="stopStudyProcess()" disabled>정지</button>
            </div>
        </div>

        <!-- 🔥 완전히 새로워진 "자동 연속 티키타카" 모드 -->
        <div id="panel-translate" style="display: none;">
            <div style="background: #ECFDF5; padding: 15px; border-radius: 8px; border: 1px solid #A7F3D0; text-align: center; color: #065F46; font-weight: bold; margin-bottom: 15px;">
                🚀 버튼 조작 없는 무한 티키타카 모드<br>
                <span style="font-size: 13px; font-weight: normal; color: #047857; display:block; margin-top:5px;">시작 버튼을 누르고 스마트폰을 테이블에 내려놓으세요.<br>AI가 알아서 듣고, 통역하고, 다시 다음 사람의 말을 듣습니다!</span>
            </div>
            
            <div class="chat-box" id="chat-box"></div>

            <div class="controls">
                <button id="btn-continuous-toggle" class="trans-start" onclick="toggleContinuousConversation()">🤝 연속 대화 시작 (버튼 조작 없음)</button>
            </div>
        </div>
    </div>

    <div id="status-bar" class="status-bar">대기 중...</div>
    
    <div id="result-box" class="result-box">
        <table id="result-table">
            <thead>
                <tr><th class="num-col">번호</th><th>영어 문장</th><th>한국어 해석</th></tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('api-key').value = savedKey;
    });

    function saveApiKey() {
        const currentKey = document.getElementById('api-key').value.trim();
        localStorage.setItem('geminiApiKey', currentKey);
    }

    function getApiKey() {
        const key = document.getElementById('api-key').value.trim();
        if(!key) { alert("API 키를 먼저 입력해주세요!"); return null; }
        return key;
    }

    const synth = window.speechSynthesis;
    let allVoices = [];
    
    function populateVoiceList() { 
        allVoices = synth.getVoices(); 
        if(allVoices.length === 0) return;
        const selectEn = document.getElementById('voice-en');
        const selectKo = document.getElementById('voice-ko');
        selectEn.innerHTML = ''; selectKo.innerHTML = '';

        let enVoices = allVoices.filter(v => v.lang.toLowerCase().startsWith('en'));
        let koVoices = allVoices.filter(v => v.lang.toLowerCase().startsWith('ko'));

        enVoices.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = (v.name.includes('Natural') || v.name.includes('Samsung') || v.name.includes('Google')) ? `⭐ ${v.name}` : v.name;
            selectEn.appendChild(opt);
        });
        koVoices.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = (v.name.includes('Natural') || v.name.includes('Samsung') || v.name.includes('Google')) ? `⭐ ${v.name}` : v.name;
            selectKo.appendChild(opt);
        });

        autoSelectBestVoice(selectEn, enVoices);
        autoSelectBestVoice(selectKo, koVoices);
    }
    
    function autoSelectBestVoice(selectEl, voices) {
        let bestIdx = voices.findIndex(v => v.name.includes('Natural') || v.name.includes('Samsung') || v.name.includes('Google'));
        if(bestIdx !== -1) selectEl.selectedIndex = bestIdx;
    }
    
    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

    function switchTab(mode) {
        document.getElementById('tab-ai').classList.toggle('active', mode === 'ai');
        document.getElementById('tab-custom').classList.toggle('active', mode === 'custom');
        document.getElementById('tab-translate').classList.toggle('active', mode === 'translate');
        
        document.getElementById('panel-ai').style.display = mode === 'ai' ? 'block' : 'none';
        document.getElementById('panel-custom').style.display = mode === 'custom' ? 'block' : 'none';
        document.getElementById('panel-translate').style.display = mode === 'translate' ? 'block' : 'none';

        stopStudyProcess();
        
        // 탭 이동 시 통역기도 강제 종료
        if (isConversing) toggleContinuousConversation();
        document.getElementById('result-box').style.display = 'none'; 
    }

    const statusBar = document.getElementById('status-bar');
    function updateStatus(text, show = true) {
        statusBar.innerHTML = text;
        statusBar.style.display = show ? 'block' : 'none';
    }

    // 💡 스마트폰에서 가끔 소리가 멈추는 버그를 막기 위한 '강철 타이머'가 추가된 음성 낭독 함수
    function speakText(text, lang, speed) {
        return new Promise((resolve) => {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = lang === 'en' ? 'en-US' : 'ko-KR'; 
            
            const voiceName = lang === 'en' ? document.getElementById('voice-en').value : document.getElementById('voice-ko').value;
            const voice = allVoices.find(v => v.name === voiceName);
            if (voice) utterThis.voice = voice;
            utterThis.rate = speed;
            
            let isResolved = false;
            
            // 만약 폰이 버그가 걸려서 재생 완료 신호를 안 주더라도, 글자 수에 비례해서 시간이 지나면 강제로 다음으로 넘어가게 만듦
            const fallbackTimer = setTimeout(() => {
                if(!isResolved) { isResolved = true; resolve(); }
            }, text.length * 200 + 3000); 
            
            utterThis.onend = () => {
                if(!isResolved) { clearTimeout(fallbackTimer); isResolved = true; resolve(); }
            };
            utterThis.onerror = () => {
                if(!isResolved) { clearTimeout(fallbackTimer); isResolved = true; resolve(); }
            };
            synth.speak(utterThis);
        });
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    
    function cleanJsonResponse(text) {
        let cleaned = text.replace(/```json/g, '').replace(/```/g, '').trim();
        return JSON.parse(cleaned);
    }

    // ================= 기존 학습 로직 =================
    let isStudyStopped = false;
    
    async function generateMultipleText(apiKey, topic, count) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const prompt = `주제: "${topic}"\n이 상황에 쓰이는 자연스러운 실생활 영어 표현 ${count}개 생성. 양식: [{"en": "영어", "ko": "한국어"}]`;
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }) });
        const data = await res.json();
        return cleanJsonResponse(data.candidates[0].content.parts[0].text);
    }

    async function translateCustomText(apiKey, lines) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const prompt = `다음 영어 문장들을 자연스럽게 한국어로 번역해.\n${lines.join('\n')}\n양식: [{"en": "영어", "ko": "한국어"}]`;
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } }) });
        const data = await res.json();
        return cleanJsonResponse(data.candidates[0].content.parts[0].text);
    }

    async function startStudyProcess(type) {
        const apiKey = getApiKey();
        if(!apiKey) return;
        isStudyStopped = false;
        synth.cancel();
        document.querySelectorAll('.btn-stop-study').forEach(b => b.disabled = false);
        let speed = parseFloat(document.getElementById('speed-control').value);
        let list = [];
        let repeat = parseInt(document.getElementById(type === 'ai' ? 'repeat-count-ai' : 'repeat-count-custom').value) || 3;

        try {
            if(type === 'ai') {
                let topic = document.getElementById('topic-input').value.trim();
                let count = document.getElementById('sentence-count').value;
                if(!topic) return alert("상황을 입력하세요.");
                updateStatus("AI가 문장을 작성 중입니다...");
                list = await generateMultipleText(apiKey, topic, count);
            } else {
                let text = document.getElementById('custom-input').value.trim();
                if(!text) return alert("문장을 입력하세요.");
                updateStatus("번역 중입니다...");
                list = await translateCustomText(apiKey, text.split('\n').filter(l=>l.trim()));
            }
            if(isStudyStopped) return;
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            list.forEach((item, i) => {
                tbody.innerHTML += `<tr id="row-${i}"><td class="num-col">${i+1}</td><td style="font-weight:700;">${item.en}</td><td style="color:#4B5563;">${item.ko}</td></tr>`;
            });
            document.getElementById('result-box').style.display = 'block';

            for(let i=0; i<list.length; i++) {
                if(isStudyStopped) break;
                document.querySelectorAll('#table-body tr').forEach(tr => tr.classList.remove('active-row'));
                document.getElementById(`row-${i}`).classList.add('active-row');
                for(let r=1; r<=repeat; r++) {
                    if(isStudyStopped) break;
                    updateStatus(`⚡ [${i+1}번] 반복 ${r}/${repeat} 회`);
                    await speakText(list[i].en, 'en', speed);
                    if(isStudyStopped) break; await sleep(600);
                    await speakText(list[i].ko, 'ko', speed);
                    if(isStudyStopped) break; await sleep(1200);
                }
            }
            if(!isStudyStopped) updateStatus("✨ 학습 완료!");
        } catch(e) { updateStatus("오류 발생. API 키가 정확한지 확인해주세요."); }
    }
    
    function stopStudyProcess() {
        isStudyStopped = true;
        synth.cancel();
        document.querySelectorAll('.btn-stop-study').forEach(b => b.disabled = true);
        updateStatus("정지됨");
    }

    // ================= 🚀 버튼 조작 없는 무한 연속 대화 (오디오 센서) 로직 =================
    let isConversing = false;
    let stream = null;
    let audioCtx = null;
    let analyser = null;
    let checkInterval = null;
    let mediaRecorder = null;
    let audioChunks = [];

    function addChatMessage(text, type) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        
        if(type === 'error') {
            div.className = 'chat-msg msg-error';
            div.innerHTML = text;
        } else {
            div.className = `chat-msg ${type === 'user' ? 'msg-user' : 'msg-ai'}`;
            let icon = type === 'user' ? '🗣️ ' : '🤖 ';
            div.innerHTML = `<strong>${icon}</strong>${text}`;
        }
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function blobToBase64(blob) {
        return new Promise((resolve, _) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(blob);
        });
    }

    async function toggleContinuousConversation() {
        const apiKey = getApiKey();
        if(!apiKey) return;

        const btn = document.getElementById('btn-continuous-toggle');

        // 대화 정지 버튼을 눌렀을 때
        if (isConversing) {
            isConversing = false;
            if (checkInterval) clearInterval(checkInterval);
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            btn.innerHTML = '🤝 연속 대화 시작 (버튼 조작 없음)';
            btn.className = 'trans-start';
            updateStatus('⏹️ 연속 대화가 완전히 종료되었습니다.');
            return;
        }

        // 연속 대화 시작 버튼을 눌렀을 때
        try {
            if (!stream) {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            }
            // 소리 감지용 센서(AudioContext) 달기
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 512;
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            isConversing = true;
            btn.innerHTML = '⏹️ 대화 완전히 종료하기 (빨간 버튼)';
            btn.className = 'trans-stop';
            
            document.getElementById('chat-box').innerHTML = '';
            addChatMessage("✅ 연속 대화 모드가 시작되었습니다. 폰을 놔두고 편하게 말씀하세요!", 'ai');
            
            // 무한 루프 시작
            runConversationTurn(apiKey);
            
        } catch (e) {
            alert("마이크 권한을 허용해주세요.");
        }
    }

    function runConversationTurn(apiKey) {
        if (!isConversing) return;

        audioChunks = [];
        
        // 브라우저마다 지원하는 녹음 파일 형식이 다름 (안전 장치)
        let mimeType = 'audio/webm';
        if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
        else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';
        
        mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        
        let hasSpoken = false;
        let silenceTicks = 0;
        let idleTicks = 0;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        
        updateStatus('🟢 언제든 말씀하세요... (마이크 감지 중)');

        // 0.1초마다 마이크에 소리가 들어오는지 체크하는 센서 가동
        checkInterval = setInterval(() => {
            if (!isConversing) { clearInterval(checkInterval); return; }

            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i = 0; i < bufferLength; i++) sum += dataArray[i];
            let volume = sum / bufferLength;

            // 소리가 기준치(12)를 넘으면 "사람이 말을 시작했다!" 라고 판단
            if (volume > 12) {
                if (!hasSpoken) {
                    hasSpoken = true;
                    updateStatus('🗣️ 회원님의 목소리가 감지되었습니다! 편하게 쭉 말씀하세요.');
                }
                silenceTicks = 0; // 말이 계속 이어지면 침묵 타이머를 0으로 리셋
            } else {
                if (hasSpoken) {
                    silenceTicks++;
                    // 말이 끝난 후 약 2.5초 동안 조용하면, "말이 완전히 끝났다!" 판단하고 녹음 종료
                    if (silenceTicks >= 25) { 
                        clearInterval(checkInterval);
                        if (mediaRecorder.state === 'recording') mediaRecorder.stop();
                    }
                } else {
                    idleTicks++;
                    // 아무도 15초 동안 말을 안 하면, 빈 파일을 버리고 조용히 다시 듣기 시작 (에러 방지)
                    if (idleTicks >= 150) { 
                        clearInterval(checkInterval);
                        if (mediaRecorder.state === 'recording') mediaRecorder.stop();
                    }
                }
            }
        }, 100);

        // 녹음이 완전히 끝났을 때 제미나이에게 보내는 작업
        mediaRecorder.onstop = async () => {
            if (!isConversing) return;
            
            // 만약 아무도 말을 안 해서 끝난 거라면, 제미나이에게 보내지 않고 조용히 다시 듣기 시작
            if (!hasSpoken) {
                runConversationTurn(apiKey);
                return;
            }

            updateStatus('🔄 제미나이가 문맥을 파악하며 통역 중입니다...');
            
            try {
                const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || mimeType });
                const base64Audio = await blobToBase64(audioBlob);
                
                // 💡 제미나이에게 내리는 완벽한 프롬프트 (기침 소리 무시 필터 장착)
                const prompt = `이 오디오는 사용자와 외국인의 실제 대화 음성입니다. 다음 지시사항을 무조건 따르세요.
                1. 사용자의 음성을 듣고, 문맥을 유추하여 완전한 문장으로 받아쓰기 하세요.
                2. 음성이 한국어면 영어로, 영어면 한국어로 번역하세요.
                3. 만약 기침소리, 물건 떨어지는 소리 등 의미 없는 소음만 들려서 번역할 문장이 없다면, original과 translated_text의 값을 모두 "IGNORE"라고 적어주세요.
                4. 결과는 무조건 아래 JSON 형식으로만 출력하세요.
                양식: {"original": "교정된 원래 문장", "translated_text": "최종 번역 문장", "target_lang": "en" 또는 "ko"}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [ { text: prompt }, { inlineData: { mimeType: (mediaRecorder.mimeType || mimeType).split(';')[0], data: base64Audio } } ] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                
                if (!response.ok) throw new Error("서버 응답 오류");

                let textRes = "";
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    textRes = data.candidates[0].content.parts[0].text;
                } else {
                    throw new Error("음성을 인식할 수 없습니다.");
                }

                let result;
                try {
                    result = cleanJsonResponse(textRes);
                } catch(e) {
                    result = { original: "IGNORE", translated_text: "IGNORE", target_lang: "en" };
                }
                
                // 💡 기침소리나 헛기침 소리였으면 화면에 띄우지 않고 조용히 다시 듣기 시작!
                if (result.original === "IGNORE" || result.translated_text === "IGNORE") {
                    if (isConversing) runConversationTurn(apiKey);
                    return;
                }
                
                addChatMessage(result.original, 'user');
                addChatMessage(result.translated_text, 'ai');
                
                let speed = parseFloat(document.getElementById('speed-control').value);
                updateStatus('🔊 외국인(또는 한국인)에게 통역 내용을 낭독 중입니다...');
                
                // 폰이 소리 내어 읽어주기 (이 동안은 마이크가 꺼짐)
                await speakText(result.translated_text, result.target_lang, speed);
                
                // 🌟 통역 낭독이 끝나면 0.5초 뒤에 자동으로 다음 턴(듣기) 시작! 🌟
                if (isConversing) {
                    setTimeout(() => runConversationTurn(apiKey), 500); 
                }
                
            } catch(error) {
                console.error(error);
                updateStatus('⚠️ 통신 불량으로 놓쳤습니다. 다시 듣기를 시작합니다.');
                // 에러가 나도 앱이 죽지 않고 2초 뒤에 불사조처럼 다시 듣기 시작함
                if (isConversing) {
                    setTimeout(() => runConversationTurn(apiKey), 2000); 
                }
            }
        };

        // 센서와 녹음기 동시 작동 시작
        mediaRecorder.start();
    }
</script>
